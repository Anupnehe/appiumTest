name: AI Pull Request Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  # Listen for comments made on the PR
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    
    # Only run the job if it's a PR event OR if a user commented "/review" on a PR
    if: >
      github.event_name == 'pull_request' || 
      (github.event_name == 'issue_comment' && 
       github.event.issue.pull_request && 
       contains(github.event.comment.body, '/review'))

    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install PyGithub python-dotenv google-genai

      - name: Run Review Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }} 
        run: |
          # Determine the PR number based on the trigger event
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUM="${{ github.event.issue.number }}"
          else
            PR_NUM="${{ github.event.pull_request.number }}"
          fi
          
          python review_agent.py "${{ github.repository }}" "$PR_NUM"
